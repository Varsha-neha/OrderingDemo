name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # ✅ updated

      - name: Set up Python
        uses: actions/setup-python@v5   # ✅ updated
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          pytest --junitxml=results.xml --html=report.html

      - name: Upload test report
        uses: actions/upload-artifact@v4   # ✅ already updated
        with:
          name: pytest-report
          path: report.html
