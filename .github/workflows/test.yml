name: CI Pipeline

on:
  push:
    branches: [ "main" ]   # triggers when code is pushed to main
  pull_request:
    branches: [ "main" ]   # also runs on PRs targeting main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run tests with Pytest
      - name: Run Pytest
        run: |
          pytest --junitxml=results.xml --html=report.html

      # Step 5: Upload test results (artifact)
      - name: Upload test report
        uses: actions/upload-artifact@v3
        with:
          name: pytest-report
          path: report.html
